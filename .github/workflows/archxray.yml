name: ArchXray
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  xray:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: MohammedRizwan4/arch-xray@main
        with:
          fail-on-violation: 'true'
