name: ArchXray
on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to x-ray'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  xray:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: MohammedRizwan4/arch-xray@main
        with:
          fail-on-violation: 'true'
          pr-number: ${{ github.event.pull_request.number || inputs.pr }}
